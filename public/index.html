<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TaskApp</title>
</head>
<body>
  <h1>TaskApp</h1>

  <div id="login">
    <h2>Login</h2>
    <input id="email" placeholder="email">
    <input id="password" placeholder="password" type="password">
    <button onclick="login()">Ingresar</button>
  </div>

  <div id="tasks" style="display:none;">
    <h2>Nueva tarea</h2>
    <input id="taskTitle" placeholder="Título de la tarea">
    <button onclick="createTask()">Crear</button>

    <h3>Listado</h3>
    <ul id="taskList"></ul>
  </div>

  app.js
</body>
</html>
